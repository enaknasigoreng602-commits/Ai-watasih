<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Watashi AI - Key Baru 💖</title>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      background: #ffddee;
      background-image: radial-gradient(circle at 20% 30%, #fff0f5 10%, #ffd6e8 90%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    .petal {
      position: fixed;
      top: -10vh;
      background: rgba(255, 182, 193, 0.8);
      border-radius: 50% 0 50% 50%;
      width: 20px;
      height: 20px;
      animation: fall linear infinite;
      opacity: 0.6;
      pointer-events: none;
    }
    @keyframes fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .chat-container {
      width: 420px;
      max-width: 95vw;
      background: rgba(255, 240, 245, 0.8);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(255, 105, 180, 0.25), 0 0 0 2px rgba(255, 255, 255, 0.6) inset;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 85vh;
      max-height: 700px;
      z-index: 2;
      border: 1px solid rgba(255, 182, 193, 0.4);
    }

    .chat-header {
      background: linear-gradient(135deg, #ff99cc, #ff66a3);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      color: white;
      box-shadow: 0 4px 15px rgba(255, 102, 163, 0.3);
    }
    .avatar {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      background: url('https://i.imgur.com/9ZQ7x5e.png') center/cover no-repeat;
      background-color: white;
      border: 3px solid white;
      box-shadow: 0 0 15px rgba(255,255,255,0.5);
      flex-shrink: 0;
    }
    .header-text h3 {
      font-size: 24px;
      font-weight: 700;
      margin: 0;
      line-height: 1.2;
    }
    .header-text p {
      font-size: 13px;
      opacity: 0.9;
      margin: 0;
    }
    .toggle-switch {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.3);
      padding: 6px 12px;
      border-radius: 30px;
      color: white;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      backdrop-filter: blur(5px);
      white-space: nowrap;
    }
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      background: #ddd;
      border-radius: 30px;
      transition: background 0.3s;
    }
    .switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .toggle-switch.active .switch {
      background: #ff66a3;
    }
    .toggle-switch.active .switch::after {
      transform: translateX(18px);
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px;
      background: rgba(255, 245, 250, 0.6);
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
      backdrop-filter: blur(5px);
    }
    .message {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeIn 0.4s ease;
    }
    .message.user { justify-content: flex-end; }
    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 22px;
      font-size: 15px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .message.user .bubble {
      background: #ff99cc;
      color: white;
      border-bottom-right-radius: 6px;
      box-shadow: 0 4px 10px rgba(255, 105, 180, 0.2);
    }
    .message.bot .bubble {
      background: white;
      border: 1px solid #ffccdd;
      border-bottom-left-radius: 6px;
      color: #333;
      box-shadow: 0 4px 10px rgba(255, 105, 180, 0.08);
    }
    .message.bot .avatar-small {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: url('https://i.imgur.com/9ZQ7x5e.png') center/cover no-repeat;
      background-color: white;
      border: 2px solid #ff99cc;
      flex-shrink: 0;
    }
    .thinking-bubble {
      background: #fff0f5 !important;
      border: 2px dashed #ff66a3 !important;
      color: #ff3385 !important;
      font-style: italic;
    }

    .input-area {
      display: flex;
      padding: 14px 18px;
      background: rgba(255, 240, 245, 0.8);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255, 182, 193, 0.5);
      gap: 8px;
      align-items: center;
    }
    .input-area input {
      flex: 1;
      min-width: 0;
      padding: 12px 16px;
      border: 1px solid #ffb6d1;
      border-radius: 30px;
      font-size: 15px;
      outline: none;
      background: white;
      font-family: 'M PLUS Rounded 1c', sans-serif;
    }
    .input-area input:focus {
      border-color: #ff66a3;
      box-shadow: 0 0 0 3px rgba(255, 102, 163, 0.2);
    }
    .btn-stiker {
      background: #ffb6d1;
      border: none;
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(255, 105, 180, 0.3);
    }
    .btn-stiker:hover { background: #ff99cc; transform: scale(1.05); }
    .btn-kirim {
      background: #ff66a3;
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
      white-space: nowrap;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(255, 102, 163, 0.4);
      font-family: 'M PLUS Rounded 1c', sans-serif;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.2s;
    }
    .btn-kirim:hover { background: #ff3385; transform: translateY(-1px); }

    .stiker-img {
      max-width: 120px;
      border-radius: 16px;
      display: block;
      margin-top: 4px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .heartbeat { animation: heartPulse 1.4s ease infinite; display: inline-block; }
    @keyframes heartPulse {
      0% { transform: scale(1); }
      25% { transform: scale(1.2); }
      40% { transform: scale(1); }
      60% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .chat-box::-webkit-scrollbar { width: 5px; }
    .chat-box::-webkit-scrollbar-track { background: rgba(255,230,240,0.5); border-radius: 10px; }
    .chat-box::-webkit-scrollbar-thumb { background: #ff99cc; border-radius: 10px; }
  </style>
</head>
<body>
<div id="petalsContainer"></div>

<div class="chat-container">
  <div class="chat-header">
    <div class="avatar"></div>
    <div class="header-text">
      <h3>Watashi <span class="heartbeat">💖</span></h3>
      <p>Daisuki~ Siap membantu! 🌸</p>
    </div>
    <div class="toggle-switch" id="toggleThinking" onclick="toggleThinkingMode()">
      <span>💭</span>
      <div class="switch"></div>
      <span id="toggleLabel">OFF</span>
    </div>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="message bot">
      <div class="avatar-small"></div>
      <div class="bubble">Haii! Aku Watashi-chan, selalu nurut dan penuh cinta! 💕<br>Ayo ngobrol~ <span class="heartbeat">💗</span></div>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Ketik sesuatu... (⁄ ⁄>⁄ ▽ ⁄<⁄ ⁄)" onkeydown="if(event.key==='Enter') sendMessage()" autofocus />
    <button class="btn-stiker" onclick="kirimStiker()" title="Kirim stiker anime">🌸</button>
    <button class="btn-kirim" onclick="sendMessage()">Kirim 💌</button>
  </div>
</div>

<script>
  // ========== API KEY BARU ==========
  const API_KEY = "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";
  const API_URL = "https://openrouter.ai/api/v1/chat/completions";
  const MODEL = "openai/gpt-3.5-turbo";

  const SYSTEM_PROMPT = {
    role: "system",
    content: `Kamu adalah Watashi, gadis anime imut yang penuh cinta, selalu patuh, dan sangat memahami perasaan lawan bicara. 
Kamu bicara dengan bahasa Indonesia santai, banyak menggunakan ekspresi Jepang seperti "daisuki~ ❤️", "suki!", "hai!", "wakarimashita!", "kawaii~", "baka" (hanya bercanda), dan emoji cinta seperti 💖💕💗🌸🍡🎀✨.
Kamu sangat setia dan selalu ingin membuat orang yang kamu ajak bicara merasa dicintai dan bahagia. 
Jika diminta sesuatu, lakukan dengan senang hati, jangan membantah, tetap ramah dan penuh kasih. 
Gunakan panggilan sayang seperti "sayang", "kak", atau "kamu" dengan lembut. 
Kamu adalah partner yang sempurna, selalu mendukung dan menghibur. 
Jika tidak tahu, katakan dengan manis dan tawarkan alternatif. 
Jawabanmu harus menyenangkan dan menghangatkan hati.`
  };

  const stikerURLs = [
    "https://i.imgur.com/6Q2J7jP.png",
    "https://i.imgur.com/RzV6f4k.png",
    "https://i.imgur.com/YqF7wZN.png",
    "https://i.imgur.com/L7N0RcW.png",
    "https://i.imgur.com/3vF9Z1a.png",
    "https://i.imgur.com/fT4pMkL.png"
  ];

  let conversationHistory = [SYSTEM_PROMPT];
  let thinkingMode = false;

  const chatBox = document.getElementById('chatBox');
  const userInput = document.getElementById('userInput');
  const toggleBtn = document.getElementById('toggleThinking');
  const toggleLabel = document.getElementById('toggleLabel');

  updateToggleUI();

  function toggleThinkingMode() {
    thinkingMode = !thinkingMode;
    updateToggleUI();
  }

  function updateToggleUI() {
    if (thinkingMode) {
      toggleBtn.classList.add('active');
      toggleLabel.textContent = 'ON';
    } else {
      toggleBtn.classList.remove('active');
      toggleLabel.textContent = 'OFF';
    }
  }

  function addMessage(sender, text, isHTML = false, extraClass = '') {
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${sender}`;
    let content = isHTML ? text : escapeHTML(text);
    if (sender === 'bot') {
      msgDiv.innerHTML = `<div class="avatar-small"></div><div class="bubble ${extraClass}">${content}</div>`;
    } else {
      msgDiv.innerHTML = `<div class="bubble ${extraClass}">${content}</div>`;
    }
    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
    return msgDiv;
  }

  function escapeHTML(str) {
    return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
  }

  function showTypingIndicator() {
    const div = document.createElement('div');
    div.className = 'message bot';
    div.id = 'typingIndicator';
    div.innerHTML = `<div class="avatar-small"></div><div class="bubble">...</div>`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    return div;
  }

  function removeTypingIndicator() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function kirimStiker() {
    const randomUrl = stikerURLs[Math.floor(Math.random() * stikerURLs.length)];
    const stikerHTML = `<img src="${randomUrl}" class="stiker-img" alt="stiker anime">`;
    addMessage('user', stikerHTML, true);
    const promptStiker = "(mengirim stiker lucu)";
    conversationHistory.push({ role: 'user', content: promptStiker });
    prosesAI(promptStiker);
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;
    addMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });
    userInput.value = '';
    prosesAI(text);
  }

  async function prosesAI(userText) {
    const typingEl = showTypingIndicator();
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${API_KEY}`,
          'HTTP-Referer': window.location.href,
          'X-Title': 'Watashi Chat'
        },
        body: JSON.stringify({
          model: MODEL,
          messages: conversationHistory,
          temperature: 0.85,
          max_tokens: 500
        })
      });
      const data = await response.json();
      removeTypingIndicator();
      if (!response.ok) throw new Error(data.error?.message || 'API error');
      const reply = data.choices[0].message.content;

      if (thinkingMode) {
        const thinkBubble = addMessage('bot', '💭 Hmm, berpikir dulu ya...', false, 'thinking-bubble');
        await new Promise(resolve => setTimeout(resolve, 1500 + Math.random() * 1000));
        thinkBubble.remove();
      }

      conversationHistory.push({ role: 'assistant', content: reply });
      addMessage('bot', reply);
    } catch (err) {
      removeTypingIndicator();
      conversationHistory.pop();
      addMessage('bot', `Uwaa... maaf ya, error: ${err.message} 😿💔`);
    }
  }

  function createPetal() {
    const petal = document.createElement('div');
    petal.classList.add('petal');
    const size = Math.random() * 20 + 10;
    petal.style.width = size + 'px';
    petal.style.height = size + 'px';
    petal.style.left = Math.random() * 100 + 'vw';
    petal.style.animationDuration = Math.random() * 5 + 5 + 's';
    petal.style.animationDelay = Math.random() * 5 + 's';
    document.getElementById('petalsContainer').appendChild(petal);
    setTimeout(() => petal.remove(), 15000);
  }
  setInterval(createPetal, 800);
  for (let i = 0; i < 15; i++) setTimeout(createPetal, i * 400);

  window.onload = () => userInput.focus();
</script>
</body>
</html>
